<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>또복 글감함 🍊</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{
  --bg:#FFFFFF; --bg-soft:#F7F7F5; --hover:#EFEFED;
  --txt:#000000; --txt-sub:#000000; --txt-dim:#000000;
  --line:#E9E9E7;
  --dark:#191919;
  --nblue:#2383E2;
  --red:#000000;
  --naver:#000000;
  --tag-yellow-bg:#FDECC8; --tag-yellow-tx:#000000;
  --tag-pink-bg:#F9E3E6;  --tag-pink-tx:#000000;
  --tag-purple-bg:#E8DEEE; --tag-purple-tx:#000000;
  --tag-gray-bg:#E3E2E0;  --tag-gray-tx:#000000;
  --tag-red-bg:#FBECEC;   --tag-red-tx:#000000;
  --tag-blue-bg:#E1EFFA;  --tag-blue-tx:#000000;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  font-family:'Pretendard',-apple-system,'Segoe UI',sans-serif;
  background:var(--bg); color:var(--txt);
  max-width:480px; margin:0 auto; min-height:100vh;
  padding-bottom:96px;
}
/* ===== compact header ===== */
header{display:flex;align-items:baseline;gap:9px;padding:22px 24px 12px;}
header h1{font-size:22px;font-weight:800;letter-spacing:-0.3px;}
header .sub{font-size:13px;color:var(--txt-dim);}
/* ===== tabs ===== */
.tabs{
  display:flex;gap:1px;padding:0 20px;position:sticky;top:0;
  background:var(--bg);z-index:10;border-bottom:1px solid var(--line);
}
.tab{
  padding:13px 13px;border:none;background:transparent;
  color:var(--txt-dim);font-family:inherit;font-size:15px;font-weight:600;
  cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;
  border-radius:4px 4px 0 0;transition:color .12s;
}
.tab:hover{background:var(--bg-soft);}
.tab.on{color:var(--txt);border-bottom-color:var(--txt);font-weight:800;}
.tab .cnt{font-size:12px;font-weight:500;color:var(--txt-dim);margin-left:2px;}
/* ===== chips ===== */
.chips{display:flex;gap:6px;padding:12px 24px 8px;overflow-x:auto;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{
  flex-shrink:0;padding:5px 10px;border-radius:4px;border:1.5px solid var(--line);
  background:var(--bg);font-family:inherit;font-size:13px;font-weight:500;
  color:#000;cursor:pointer;transition:border-color .12s;
}
.chip:hover{filter:brightness(.97);}
.chip.on{border-color:#000;font-weight:700;}
/* ===== cards ===== */
.list{padding:4px 24px 0;display:flex;flex-direction:column;gap:10px;}
.card{
  background:var(--bg);border:1px solid var(--line);border-radius:8px;
  padding:14px 16px;transition:box-shadow .12s;
  animation:fadeUp .22s ease both;
}
.card:hover{box-shadow:0 2px 8px rgba(15,15,15,.06);}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
.card-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.badge{font-size:12px;font-weight:500;padding:2px 8px;border-radius:4px;letter-spacing:-0.2px;}
.b-stock{background:var(--tag-yellow-bg);color:var(--tag-yellow-tx);}
.b-money{background:var(--tag-pink-bg);color:var(--tag-pink-tx);}
.b-estate{background:var(--tag-purple-bg);color:var(--tag-purple-tx);}
.b-etc{background:var(--tag-gray-bg);color:var(--tag-gray-tx);}
.t-issue{background:var(--tag-red-bg);color:var(--tag-red-tx);}
.t-main{background:var(--tag-blue-bg);color:var(--tag-blue-tx);}
.t-long{background:var(--tag-gray-bg);color:var(--tag-gray-tx);}
.old-badge{font-size:12px;font-weight:500;padding:2px 8px;border-radius:4px;background:var(--tag-red-bg);color:var(--red);}
.plan-mark{font-size:12px;font-weight:500;padding:2px 8px;border-radius:4px;background:var(--tag-blue-bg);color:var(--tag-blue-tx);}
.card h3{font-size:15.5px;font-weight:700;letter-spacing:-0.2px;margin:9px 0 3px;line-height:1.4;}
.card .kw{font-size:12.5px;color:var(--txt-sub);font-weight:500;margin-bottom:3px;}
.card .kw::before{content:'# ';color:var(--txt-dim);}
.card .memo{font-size:13.5px;color:var(--txt-sub);line-height:1.55;white-space:pre-wrap;margin-top:2px;}
.card .meta{font-size:12px;color:var(--txt-dim);margin-top:9px;}
.outline-box{
  margin-top:10px;background:var(--bg-soft);border-radius:6px;padding:12px 13px;
  font-size:13px;line-height:1.6;white-space:pre-wrap;color:var(--txt);
}
.card-actions{
  display:flex;align-items:center;gap:2px;margin-top:11px;
  padding-top:11px;border-top:1px solid var(--bg-soft);flex-wrap:wrap;
}
.done-check{
  flex:1;display:flex;align-items:center;gap:8px;cursor:pointer;
  font-size:13.5px;font-weight:500;color:var(--txt-sub);user-select:none;min-width:110px;
}
.done-check input{width:17px;height:17px;accent-color:var(--nblue);cursor:pointer;}
.icon-btn{
  border:none;background:transparent;border-radius:4px;padding:6px 9px;
  font-family:inherit;font-size:12.5px;font-weight:500;color:var(--txt-sub);cursor:pointer;
  transition:background .12s;
}
.icon-btn:hover{background:var(--hover);}
.icon-btn.del{color:var(--red);}
.icon-btn.naver{color:var(--naver);font-weight:700;}
/* ===== empty ===== */
.empty{padding:52px 24px;text-align:center;color:var(--txt-dim);font-size:14px;line-height:1.7;}
.empty .emoji{font-size:32px;display:block;margin-bottom:10px;}
/* ===== FAB ===== */
.fab{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
  width:calc(100% - 48px);max-width:432px;
  padding:14px;border:none;border-radius:8px;
  background:var(--dark);color:#fff;font-family:inherit;
  font-size:15px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 14px rgba(15,15,15,.25);z-index:20;transition:opacity .12s;
}
.fab:hover{opacity:.88;}
/* ===== modal ===== */
.overlay{
  position:fixed;inset:0;background:rgba(15,15,15,.5);z-index:30;
  display:none;align-items:flex-end;justify-content:center;
}
.overlay.show{display:flex;}
.sheet{
  background:#fff;width:100%;max-width:480px;
  border-radius:12px 12px 0 0;padding:24px 24px 30px;
  animation:slideUp .22s ease;max-height:88vh;overflow-y:auto;
}
@keyframes slideUp{from{transform:translateY(40px);opacity:0;}to{transform:none;opacity:1;}}
.sheet h2{font-size:18px;font-weight:800;margin-bottom:16px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--txt-dim);margin-bottom:6px;}
.field input,.field textarea{
  width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:6px;
  font-family:inherit;font-size:15px;background:var(--bg-soft);color:var(--txt);
}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--nblue);background:#fff;box-shadow:0 0 0 2px rgba(35,131,226,.15);}
.field textarea{resize:none;height:86px;line-height:1.5;}
.field textarea.tall{height:150px;}
.cat-pick{display:flex;gap:6px;flex-wrap:wrap;}
.cat-pick button{
  padding:8px 13px;border-radius:5px;border:1.5px solid transparent;
  font-family:inherit;font-size:13px;font-weight:500;
  color:#000;cursor:pointer;opacity:.5;
}
.cat-pick button.on{border-color:#000;opacity:1;font-weight:700;}
.sheet-btns{display:flex;gap:8px;margin-top:18px;}
.sheet-btns button{
  flex:1;padding:13px;border:none;border-radius:8px;
  font-family:inherit;font-size:14.5px;font-weight:700;cursor:pointer;
}
.btn-cancel{background:var(--bg-soft);color:var(--txt-sub);border:1px solid var(--line);}
.btn-save{background:var(--dark);color:#fff;}
.btn-save:disabled{opacity:.5;cursor:default;}
/* picker */
.pick-item{
  display:flex;align-items:center;gap:8px;padding:11px 6px;border-bottom:1px solid var(--bg-soft);
  cursor:pointer;font-size:14px;font-weight:600;border-radius:4px;
}
.pick-item:hover{background:var(--bg-soft);}
.pick-item .badge{flex-shrink:0;}
.pick-empty{padding:20px 6px;font-size:13.5px;color:var(--txt-dim);}
/* ===== plan tab ===== */
.plan-wrap{padding:14px 24px 0;}
.week-label{font-size:13px;font-weight:700;color:var(--txt-sub);margin-bottom:10px;}
.slot{
  display:flex;align-items:center;gap:10px;
  border:1px solid var(--line);border-radius:8px;padding:12px 14px;margin-bottom:8px;
  background:var(--bg);
}
.slot .day{font-size:13px;font-weight:800;width:22px;flex-shrink:0;color:var(--txt-sub);}
.slot .s-body{flex:1;min-width:0;}
.slot .s-title{font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.slot .s-title.empty-t{color:var(--txt-dim);font-weight:500;}
.slot .s-cat{margin-top:3px;}
.slot.done-slot{background:var(--bg-soft);}
.slot.done-slot .s-title{text-decoration:line-through;color:var(--txt-dim);}
.slot-btn{
  border:1px solid var(--line);background:#fff;border-radius:5px;padding:6px 10px;
  font-family:inherit;font-size:12.5px;font-weight:600;color:var(--txt-sub);cursor:pointer;flex-shrink:0;
}
.slot-btn:hover{background:var(--bg-soft);}
/* reco */
.reco-head{display:flex;align-items:center;justify-content:space-between;margin:20px 0 10px;}
.reco-head h3{font-size:15px;font-weight:800;}
.btn-ai{
  border:none;background:var(--dark);color:#fff;border-radius:6px;padding:9px 14px;
  font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;
}
.btn-ai:disabled{opacity:.5;}
.reco-note{font-size:12px;color:var(--txt-dim);line-height:1.55;margin-bottom:10px;}
.reco-group{margin-bottom:14px;}
.reco-group .g-name{font-size:12.5px;font-weight:700;color:var(--txt-sub);margin-bottom:6px;}
.reco{
  display:flex;align-items:center;gap:8px;
  border:1px solid var(--line);border-radius:6px;padding:10px 12px;margin-bottom:6px;
}
.reco .r-body{flex:1;min-width:0;}
.reco .r-kw{font-size:14px;font-weight:700;line-height:1.35;}
.reco .r-meta{display:flex;gap:5px;align-items:center;margin-top:4px;flex-wrap:wrap;}
.reco .r-reason{font-size:11.5px;color:var(--txt-dim);}
.reco .r-btns{display:flex;gap:2px;flex-shrink:0;}
.loading{padding:24px 0;text-align:center;color:var(--txt-dim);font-size:13.5px;}
.spinner{
  display:inline-block;width:16px;height:16px;border:2px solid var(--line);
  border-top-color:var(--txt-sub);border-radius:50%;vertical-align:-3px;margin-right:8px;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
/* ===== photos ===== */
.thumbs{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.thumb{width:64px;height:64px;object-fit:cover;border-radius:6px;border:1px solid var(--line);cursor:pointer;background:var(--bg-soft);}
.photo-row{display:flex;gap:8px;flex-wrap:wrap;}
.pthumb{position:relative;}
.pthumb img{width:72px;height:72px;object-fit:cover;border-radius:6px;border:1px solid var(--line);display:block;}
.pthumb .px{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:#000;color:#fff;border:none;font-size:11px;cursor:pointer;line-height:1;}
.padd{width:72px;height:72px;border:1.5px dashed var(--line);border-radius:6px;background:var(--bg-soft);font-size:24px;color:var(--txt-dim);cursor:pointer;font-family:inherit;}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:50;display:none;align-items:center;justify-content:center;padding:16px;}
.lightbox.show{display:flex;}
.lightbox img{max-width:100%;max-height:92vh;border-radius:8px;}
/* ===== stats ===== */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 24px 4px;}
.stat{background:var(--bg-soft);border-radius:8px;padding:14px 16px;}
.stat .label{font-size:12.5px;color:var(--txt-dim);font-weight:600;}
.stat .val{font-size:23px;font-weight:800;margin-top:5px;letter-spacing:-0.5px;}
.stat .val small{font-size:13px;font-weight:600;color:var(--txt-dim);}
.section{margin:10px 24px;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:18px 16px;}
.section h3{font-size:14.5px;font-weight:700;margin-bottom:14px;}
.trend{display:flex;align-items:flex-end;gap:8px;height:130px;padding-top:6px;}
.trend .col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:5px;}
.trend .num{font-size:12px;font-weight:700;color:var(--txt);}
.trend .bar{width:70%;max-width:34px;display:flex;flex-direction:column;border-radius:4px 4px 0 0;overflow:hidden;min-height:2px;}
.trend .bar span{width:100%;display:block;}
.trend .col.zero .bar{background:var(--line);height:2%!important;}
.trend .col.zero .num{color:var(--txt-dim);font-weight:500;}
.tlegend{display:flex;gap:12px;margin-top:12px;font-size:12px;flex-wrap:wrap;}
.tlegend i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;vertical-align:0;}
.trend .mon{font-size:11.5px;color:var(--txt-dim);font-weight:500;}
.bar-row{margin-bottom:13px;}
.bar-row:last-child{margin-bottom:0;}
.bar-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.bar-head .nums{color:var(--txt-dim);font-weight:500;font-size:12px;}
.bar-track{height:8px;background:var(--bg-soft);border:1px solid var(--line);border-radius:99px;overflow:hidden;display:flex;}
.bar-fill-done{height:100%;}
.bar-fill-todo{height:100%;opacity:.45;}
.f-stock{background:var(--tag-yellow-bg);} .f-money{background:var(--tag-pink-bg);} .f-estate{background:var(--tag-purple-bg);} .f-etc{background:var(--tag-gray-bg);}
.trend .bar span + span{border-top:1.5px solid #fff;}
.tlegend i{border:1px solid var(--line);}
.legend{display:flex;gap:14px;margin-top:12px;font-size:12px;color:var(--txt-dim);}
.legend span::before{content:'';display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;background:var(--txt-dim);}
.legend .l-done::before{opacity:1;}
.legend .l-todo::before{opacity:.35;}
.old-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bg-soft);font-size:14px;}
.old-item:last-child{border-bottom:none;}
.old-item .rank{font-weight:800;color:var(--txt-dim);width:18px;flex-shrink:0;}
.old-item .title{flex:1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.old-item .days{font-size:12.5px;color:var(--red);font-weight:600;flex-shrink:0;}
.hint{font-size:12px;color:var(--txt-dim);margin-top:10px;line-height:1.55;}
</style>
</head>
<body>

<header>
  <h1>🍊 또복 글감함</h1>
  <span class="sub">블로그 글감 모음</span>
</header>

<div class="tabs">
  <button class="tab on" data-tab="idea" onclick="switchTab('idea')">글감 <span class="cnt" id="cntIdea"></span></button>
  <button class="tab" data-tab="done" onclick="switchTab('done')">완료 <span class="cnt" id="cntDone"></span></button>
  <button class="tab" data-tab="plan" onclick="switchTab('plan')">주간 플랜</button>
  <button class="tab" data-tab="stats" onclick="switchTab('stats')">분석</button>
</div>

<div class="chips" id="chips"></div>
<div class="list" id="list"></div>
<div id="planView" style="display:none;"></div>
<div id="statsView" style="display:none;"></div>

<button class="fab" id="fab" onclick="openSheet()">+ 글감 추가</button>

<!-- 글감 추가/수정 -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeSheet()">
  <div class="sheet">
    <h2 id="sheetTitle">새 글감</h2>
    <div class="field"><label>제목 *</label><input id="fTitle" placeholder="예: QLD 적립식 6개월 결산" maxlength="80"></div>
    <div class="field"><label>카테고리</label><div class="cat-pick" id="catPick"></div></div>
    <div class="field"><label>메인키워드</label><input id="fKw" placeholder="예: QLD 적립식 수익률" maxlength="50"></div>
    <div class="field"><label>메모</label><textarea id="fMemo" placeholder="글 방향, 넣을 수치, 참고 자료 등"></textarea></div>
    <div class="field"><label>레퍼런스 캡처 (최대 5장 · 업로드 완료 시 자동 삭제)</label>
      <div class="photo-row" id="photoRow"></div>
    </div>
    <input type="file" id="photoInput" accept="image/*" multiple style="display:none" onchange="addPhotos(this.files);this.value='';">
    <div class="sheet-btns">
      <button class="btn-cancel" onclick="closeSheet()">취소</button>
      <button class="btn-save" onclick="saveIdea()">저장</button>
    </div>
  </div>
</div>

<!-- 플랜 슬롯 글감 선택 -->
<div class="overlay" id="pickOverlay" onclick="if(event.target===this)closePicker()">
  <div class="sheet">
    <h2>글감 배치</h2>
    <div id="pickList"></div>
    <div class="sheet-btns">
      <button class="btn-cancel" onclick="closePicker()">닫기</button>
      <button class="btn-save" id="pickClearBtn" onclick="clearSlot()">배치 해제</button>
    </div>
  </div>
</div>

<!-- 글 구성(목차) 생성 -->
<div class="overlay" id="olOverlay" onclick="if(event.target===this)closeOutline()">
  <div class="sheet">
    <h2>글 구성 짜기</h2>
    <div class="reco-note" id="olTarget"></div>
    <div class="field">
      <label>네이버 AI 브리핑 붙여넣기 (선택)</label>
      <textarea id="olBriefing" class="tall" placeholder="네이버에서 검색 후 AI 브리핑 영역 텍스트를 복사해서 붙여넣으면, 그 골격을 미러링한 목차를 짜줘요. 비워두면 기본 공식(방법/장점/주의점)으로 생성돼요."></textarea>
    </div>
    <div class="sheet-btns">
      <button class="btn-cancel" onclick="closeOutline()">취소</button>
      <button class="btn-save" id="olGenBtn" onclick="genOutline()">목차 생성</button>
    </div>
    <div id="olStatus"></div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="this.classList.remove('show')"><img id="lightboxImg" alt=""></div>

<script>
/* ================= 기본 데이터 ================= */
const CATS = [
  {id:'stock',  name:'주식·ETF',   cls:'b-stock',  f:'f-stock'},
  {id:'money',  name:'재테크·가계', cls:'b-money',  f:'f-money'},
  {id:'estate', name:'부동산·임장', cls:'b-estate', f:'f-estate'},
  {id:'etc',    name:'기타',       cls:'b-etc',    f:'f-etc'},
];
const SLOT_DEF = [
  {day:'월', cat:'stock'},
  {day:'화', cat:'money'},
  {day:'수', cat:'estate'},
  {day:'목', cat:'stock'},
  {day:'금', cat:'money'},
];
const KEY='ddobok_ideas_v1';
let mem=null;
const hasCloud = (typeof window!=='undefined') && window.storage && typeof window.storage.get==='function';
async function loadData(){
  if(hasCloud){
    try{
      const r = await window.storage.get(KEY);
      if(r && r.value) return JSON.parse(r.value);
    }catch(e){ /* 키 없음 = 첫 실행 */ }
    return [];
  }
  try{ return JSON.parse(localStorage.getItem(KEY)||'[]'); }catch(e){ return mem||[]; }
}
function save(arr){
  if(hasCloud){
    window.storage.set(KEY, JSON.stringify(arr)).catch(e=>console.error('cloud save fail',e));
  }
  try{ localStorage.setItem(KEY, JSON.stringify(arr)); }catch(e){ mem=arr; }
}

let items = [];

/* ===== 사진 저장 (IndexedDB) ===== */
let idb=null;
function idbOpen(){
  return new Promise((res,rej)=>{
    if(idb) return res(idb);
    const r=indexedDB.open('ddobok_photos',1);
    r.onupgradeneeded=e=>{ e.target.result.createObjectStore('photos'); };
    r.onsuccess=e=>{ idb=e.target.result; res(idb); };
    r.onerror=()=>rej(r.error);
  });
}
async function photoPut(id,data){ const db=await idbOpen(); return new Promise((res,rej)=>{ const tx=db.transaction('photos','readwrite'); tx.objectStore('photos').put(data,id); tx.oncomplete=res; tx.onerror=()=>rej(tx.error); }); }
async function photoGet(id){ const db=await idbOpen(); return new Promise((res)=>{ const rq=db.transaction('photos').objectStore('photos').get(id); rq.onsuccess=()=>res(rq.result||null); rq.onerror=()=>res(null); }); }
function photoDel(id){ idbOpen().then(db=>{ db.transaction('photos','readwrite').objectStore('photos').delete(id); }).catch(()=>{}); }
function compressImage(file){
  return new Promise((res,rej)=>{
    const url=URL.createObjectURL(file);
    const img=new Image();
    img.onload=()=>{
      const MAX=1200;
      const scale=Math.min(1, MAX/img.width);
      const w=Math.round(img.width*scale), h=Math.round(img.height*scale);
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      res(cv.toDataURL('image/jpeg',0.8));
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); rej(new Error('img load fail')); };
    img.src=url;
  });
}
async function hydrateThumbs(){
  const imgs=document.querySelectorAll('img[data-pid]');
  for(const img of imgs){
    const d=await photoGet(img.dataset.pid);
    if(d) img.src=d; else img.style.display='none';
  }
}

  const d=await photoGet(id);
  if(!d) return;
  document.getElementById('lightboxImg').src=d;
  document.getElementById('lightbox').classList.add('show');
}

function daysSince(ts){ return Math.floor((Date.now()-ts)/86400000); }
function catOf(id){ return CATS.find(c=>c.id===id)||CATS[3]; }
function esc(s){ return (s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function weekStart(){ const d=new Date(); const off=(d.getDay()+6)%7; d.setHours(0,0,0,0); d.setDate(d.getDate()-off); return d.toISOString().slice(0,10); }

function toggleDone(id){
  const i=items.find(x=>x.id===id); if(!i)return;
  i.done=!i.done;
  i.doneAt = i.done ? Date.now() : null;
  if(i.done && i.photoIds && i.photoIds.length){
    i.photoIds.forEach(photoDel);
    i.photoIds=[];
  }
  save(items); render();
}
function delIdea(id){
  if(!confirm('이 글감을 삭제할까요?'))return;
  const it=items.find(x=>x.id===id);
  if(it && it.photoIds) it.photoIds.forEach(photoDel);
  items = items.filter(x=>x.id!==id);
  save(items); render();
}

    try{
      const data = await compressImage(f);

      sheetPhotos.push(pid); sheetNew.push(pid);

function saveReco(cid, gi){
  const r = recoResults.filter(x=>x.cat===cid)[gi];
  if(!r) return;
  items.push({id:'i'+Date.now()+Math.random().toString(36).slice(2,6),
    title:r.keyword, kw:r.keyword, memo:(r.tag==='이슈'&&r.reason)?('이슈 근거: '+r.reason+' · 이번 주 내 발행 권장'):'',
    cat:cid, createdAt:Date.now(), done:false, doneAt:null});

  const el=document.getElementById('reco_'+cid+'_'+gi);
  if(el) el.style.opacity='.4';
  render();
}

async function fetchReco(){
  const btn=document.getElementById('recoBtn');
  btn.disabled=true;
  document.getElementById('recoArea').innerHTML='<div class="loading"><span class="spinner"></span>이번 주 이슈 검색 + 검색어 생성 중… (최대 1분)</div>';

  const recent = items.filter(i=>i.done).sort((a,b)=>b.doneAt-a.doneAt).slice(0,10).map(i=>i.title);
  const now=new Date();
  const prompt =
'너는 네이버 블로그 SEO 전문가다. 한국 재테크 블로그(독자: 주식초보 4050 + 2030 맞벌이 신혼부부)를 위한 블로그 메인 검색어를 추천하라.\n\n'

+'[보유 글감 - 중복 추천 금지]\n'+(backlog.join('\n')||'없음')+'\n'
+'[최근 발행 - 유사 주제 회피]\n'+(recent.join('\n')||'없음')+'\n'
+(recoShown.length?'[이미 추천했던 검색어 - 제외]\n'+recoShown.join('\n')+'\n':'')
+'\n작업 순서:\n'
+'1. 웹서치로 이번 주 한국 경제 이슈를 검색하라: 기준금리, ETF 신규 상장, 반도체·AI 섹터, 대출 규제, 부동산 대책, 청년·신혼 정책, 세제 변경.\n'
+'2. 이슈형 검색어는 직결 공식으로 변환: 이슈명 + 수혜주/관련주/관련 ETF/내용/조건/대상/신청방법. (예: 금리 인하 발표 → "금리인하 수혜주")\n'
+'3. 나머지는 사람들이 실제 검색창에 치는 네이버식 명사 조합 2~4단어. 문장형 금지. 포화 대형 키워드 금지("ETF 추천", "재테크 방법" 등).\n'
+'4. 카테고리: stock(주식·ETF), money(재테크·가계·신혼부부), estate(부동산·대출·청약). 카테고리당 5개.\n'
+'5. 태그: "이슈"(이번 주 사건 기반, reason에 날짜+사건 한 줄 필수) / "메인도전"(검색량 크지만 경쟁도 있음) / "롱테일"(검색량 적지만 상위노출 쉬움). 카테고리당 이슈 1~2개 포함.\n'
+'\n검색이 끝나면 마지막에 반드시 아래 JSON만 출력하라. 다른 텍스트·마크다운 금지:\n'

  try{

      method:"POST",

    intents:['조건','소득 기준','한도','신청 방법','필요 서류','금리','체크리스트','후기 포인트']}

const SEASON = {1:[['money','연말정산 환급금 조회'],['stock','ISA 계좌 개설 시기']],2:[['money','연말정산 추가납부 이유']],3:[['stock','배당 기준일 확인 방법']],4:[['money','종합소득세 대상 확인']],5:[['money','종합소득세 신고 방법'],['money','근로장려금 신청 조건']],6:[['estate','재산세 조회 방법']],7:[['estate','재산세 납부 기간'],['estate','재산세 카드 혜택']],8:[['money','청약통장 월 납입금 변경']],9:[['estate','재산세 2기분 납부']],10:[['money','연말정산 미리보기']],11:[['stock','ISA 납입한도 확인'],['stock','연금저축 세액공제 한도']],12:[['money','연말정산 카드 소득공제'],['stock','배당락일 확인 방법']]};
function localReco(){
  const out=[];
  const taken = new Set(recoShown.concat(items.map(i=>i.kw||i.title)));
  const season = SEASON[new Date().getMonth()+1]||[];
  season.forEach(([cid,kw])=>{
    if(!taken.has(kw)) out.push({cat:cid, keyword:kw, tag:'이슈', reason:(new Date().getMonth()+1)+'월 시즌 키워드'});
  });
  ['stock','money','estate'].forEach(cid=>{
    const b=BANK[cid]; let tries=0;
    let cnt = out.filter(o=>o.cat===cid).length;
    while(cnt<5 && tries<80){
      tries++;
      const kw = b.cores[Math.floor(Math.random()*b.cores.length)]+' '+b.intents[Math.floor(Math.random()*b.intents.length)];
      if(taken.has(kw) || out.some(o=>o.keyword===kw)) continue;
      out.push({cat:cid, keyword:kw, tag: Math.random()<0.35?'메인도전':'롱테일'});
      cnt++;
    }
  });
  return out;
}

/* ================= 플랜 슬롯 배치 ================= */
function openPicker(idx){
  pickSlot=idx;
  const wk=weekStart();
  const slotCat=SLOT_DEF[idx].cat;
  const cand = items.filter(i=>!i.done);
  const first = cand.filter(i=>i.cat===slotCat);
  const rest = cand.filter(i=>i.cat!==slotCat);
  const row = i=>{
    const c=catOf(i.cat);
    return '<div class="pick-item" onclick="assignSlot(\''+i.id+'\')"><span class="badge '+c.cls+'">'+c.name+'</span><span>'+esc(i.title)+'</span></div>';
  };
  document.getElementById('pickList').innerHTML =
    (first.length?first.map(row).join(''):'<div class="pick-empty">이 카테고리 대기 글감이 없어요. 아래 다른 카테고리에서 골라도 돼요.</div>')
    +(rest.length?'<div class="pick-empty" style="padding-bottom:4px;">다른 카테고리</div>'+rest.map(row).join(''):'');
  const has = items.some(x=>x.plan && x.plan.week===wk && x.plan.slot===idx);
  document.getElementById('pickClearBtn').style.display = has?'block':'none';
  document.getElementById('pickOverlay').classList.add('show');
}
function closePicker(){ document.getElementById('pickOverlay').classList.remove('show'); }
function assignSlot(id){
  const wk=weekStart();
  items.forEach(x=>{ if(x.plan && x.plan.week===wk && x.plan.slot===pickSlot) delete x.plan; });
  const i=items.find(x=>x.id===id);
  if(i) i.plan={week:wk, slot:pickSlot};
  save(items); closePicker(); render();
}
function clearSlot(){
  const wk=weekStart();
  items.forEach(x=>{ if(x.plan && x.plan.week===wk && x.plan.slot===pickSlot) delete x.plan; });
  save(items); closePicker(); render();
}

/* ================= 글 구성(목차) ================= */
function openOutline(id){
  olItemId=id;
  const i=items.find(x=>x.id===id);
  document.getElementById('olTarget').textContent = '「'+i.title+'」'+(i.kw?' · 메인키워드: '+i.kw:'');
  document.getElementById('olBriefing').value='';
  document.getElementById('olStatus').innerHTML='';
  document.getElementById('olOverlay').classList.add('show');
}
function closeOutline(){ document.getElementById('olOverlay').classList.remove('show'); }
async function genOutline(){
  const i=items.find(x=>x.id===olItemId); if(!i) return;
  const briefing=document.getElementById('olBriefing').value.trim();
  const btn=document.getElementById('olGenBtn');
  btn.disabled=true;
  document.getElementById('olStatus').innerHTML='<div class="loading"><span class="spinner"></span>목차 생성 중…</div>';
  const prompt =
'네이버 블로그 글의 소제목 목차를 짜라. 네이버 AI 브리핑 인용 전략 기반이다.\n\n'
+'[글 제목] '+i.title+'\n[메인키워드] '+(i.kw||i.title)+'\n'
+(briefing?'\n[네이버 AI 브리핑 원문]\n'+briefing+'\n\n규칙:\n- 브리핑의 구조 골격(정의→종류→활용→동향 등 실제 순서)을 그대로 미러링한 소제목 순서로 짜라.\n- 각 소제목 아래 괄호로 "여기에 추가할 정밀 데이터(구체 날짜/수치/원인)" 한 줄 지시를 달아라.\n- 차별화 섹션(관련주, 실전 경험, 개인 데이터)은 브리핑 골격 뒤에 별도로 추가하라.\n'
:'\n브리핑 원문이 없으므로 기본 공식으로 짜라: ①정의/개념 ②방법 ③장점 ④주의점 ⑤그래도 하는 이유(개인 경험·수치) ⑥FAQ 2~3개. 각 소제목 아래 괄호로 넣을 표·수치 지시 한 줄.\n')
+'\n공통 규칙:\n- 소제목에 메인키워드를 넣지 마라. 자연스러운 소제목으로 쓴다.\n- 섹션마다 인용 가능한 표나 수치를 하나씩 배치하도록 지시하라.\n- 출력은 번호 붙은 소제목 목록 + 지시줄만. 서론·설명·마크다운 헤더 금지.';
  let outline=null;
  try{
    const response = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:prompt}]})
    });
    const data = await response.json();
    outline = data.content.filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
    if(!outline) throw new Error('empty');
  }catch(err){
    outline = localOutline(i, briefing);
  }
  i.outline = outline;
  save(items);
  btn.disabled=false;
  closeOutline(); render();
}
function localOutline(i, briefing){
  const t=i.title;
  let head = briefing ? '※ 오프라인이라 브리핑 자동 분석은 못 했어요. 붙여넣은 브리핑의 섹션 순서를 그대로 따라 소제목을 배치하고, 아래 골격은 참고용으로.\n\n' : '';
  return head
    +'① 개념 정리 — 정의 + 일상 비유 하나\n'
    +'② 하는 방법 — 단계별 (실제 날짜·금액 넣기)\n'
    +'③ 좋은 점 — 수치 근거 표 1개\n'
    +'④ 주의할 점 — 위험·세금·수수료 표 1개\n'
    +'⑤ 그래도 하는 이유 — 개인 기록 (누적 매수금·수익률·기간)\n'
    +'⑥ FAQ 2~3개 — 검색 의도 기반 질문\n'
    +'(소제목에 메인키워드 넣지 않기 · 섹션마다 인용 가능한 표/수치 1개)';
}

/* ================= 분석 ================= */
function renderStats(){
  const done=items.filter(i=>i.done), todo=items.filter(i=>!i.done);
  const total=items.length;
  const rate = total ? Math.round(done.length/total*100) : 0;
  const now=new Date();
  const monthDone = done.filter(i=>{ const d=new Date(i.doneAt); return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth(); }).length;
  const leads = done.filter(i=>i.doneAt).map(i=>(i.doneAt-i.createdAt)/86400000);
  const avgLead = leads.length ? (leads.reduce((a,b)=>a+b,0)/leads.length) : null;

  const months=[];
  for(let k=5;k>=0;k--){
    const d=new Date(now.getFullYear(), now.getMonth()-k, 1);
    const inMonth = done.filter(i=>{ const x=new Date(i.doneAt); return x.getFullYear()===d.getFullYear() && x.getMonth()===d.getMonth(); });
    const byCat={};
    CATS.forEach(c=>{ byCat[c.id]=inMonth.filter(i=>i.cat===c.id).length; });
    months.push({label:(d.getMonth()+1)+'월', cnt:inMonth.length, byCat});
  }
  const maxM = Math.max(1, ...months.map(m=>m.cnt));

  const bars = CATS.map(c=>{
    const t=todo.filter(i=>i.cat===c.id).length, d=done.filter(i=>i.cat===c.id).length;
    const sum=t+d, max=Math.max(1,...CATS.map(x=>items.filter(i=>i.cat===x.id).length));
    return {c,t,d,sum,w:sum/max*100};
  }).filter(b=>b.sum>0);

  const oldest = [...todo].sort((a,b)=>a.createdAt-b.createdAt).slice(0,3);

  document.getElementById('statsView').innerHTML =
    '<div class="stat-grid">'
      +'<div class="stat"><div class="label">전체 글감</div><div class="val">'+total+'<small>개</small></div></div>'
      +'<div class="stat"><div class="label">업로드 완료율</div><div class="val">'+rate+'<small>%</small></div></div>'
      +'<div class="stat"><div class="label">이번 달 업로드</div><div class="val">'+monthDone+'<small>편</small></div></div>'
      +'<div class="stat"><div class="label">평균 소요일</div><div class="val">'+(avgLead===null?'-':avgLead.toFixed(1))+'<small>일</small></div></div>'
    +'</div>'
    +'<div class="section"><h3>월별 업로드 추이</h3><div class="trend">'
      +months.map(m=>'<div class="col '+(m.cnt===0?'zero':'')+'"><span class="num">'+m.cnt+'</span><div class="bar" style="height:'+Math.max(2,m.cnt/maxM*100)+'%">'
        +CATS.map(c=>{ const v=m.byCat[c.id]; return v?'<span class="'+c.f+'" style="height:'+(v/m.cnt*100)+'%"></span>':''; }).join('')
      +'</div><span class="mon">'+m.label+'</span></div>').join('')
    +'</div>'
    +'<div class="tlegend">'+CATS.map(c=>'<span><i class="'+c.f+'"></i>'+c.name+'</span>').join('')+'</div>'
    +'<div class="hint">완료 체크한 날짜 기준으로 집계돼요. 주 5편이면 월 20편 안팎이 목표선이에요.</div></div>'
    +'<div class="section"><h3>카테고리별 현황</h3>'
      +(bars.length ? bars.map(b=>
        '<div class="bar-row"><div class="bar-head"><span class="badge '+b.c.cls+'">'+b.c.name+'</span><span class="nums">대기 '+b.t+' · 완료 '+b.d+'</span></div>'
        +'<div class="bar-track" style="width:'+b.w+'%"><div class="bar-fill-done '+b.c.f+'" style="width:'+(b.sum?b.d/b.sum*100:0)+'%"></div><div class="bar-fill-todo '+b.c.f+'" style="width:'+(b.sum?b.t/b.sum*100:0)+'%"></div></div></div>').join('')
      : '<div class="hint">글감을 추가하면 카테고리 밸런스가 보여요.</div>')
      +'<div class="legend"><span class="l-done">완료</span><span class="l-todo">대기</span></div>'
    +'</div>'
    +'<div class="section"><h3>오래 묵은 글감 TOP 3</h3>'
      +(oldest.length ? oldest.map((i,idx)=>'<div class="old-item"><span class="rank">'+(idx+1)+'</span><span class="title">'+esc(i.title)+'</span><span class="days">'+daysSince(i.createdAt)+'일째</span></div>').join('')
      : '<div class="hint">대기 중인 글감이 없어요. 깔끔하네요!</div>')
      +'<div class="hint">이슈 태그로 저장한 글감은 유통기한이 짧으니 주간 플랜 앞 요일에 배치하는 게 좋아요.</div>'
    +'</div>';
}

(async()=>{ items = await loadData(); render(); })();
</script>
